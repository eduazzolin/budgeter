<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded card (squircle shape) -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#grad)" />
  <!-- A clean wallet and coins icon in white -->
  <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" transform="translate(48, 48) scale(0.8125)">
    <!-- Wallet body -->
    <path d="M384 160 H128 C92.65 160 64 188.65 64 224 v160 c0 35.35 28.65 64 64 64 h256 c35.35 0 64-28.65 64-64 V224 c0-35.35-28.65-64-64-64 z" />
    <!-- Wallet flap -->
    <path d="M352 256 h64 c17.68 0 32 14.32 32 32 v32 c0 17.68-14.32 32-32 32 h-64 z" />
    <!-- Flap button -->
    <circle cx="384" cy="304" r="12" fill="#ffffff" />
    <!-- Coins stack peeking out -->
    <path d="M160 160 V112 c0-17.68 14.32-32 32-32 h128 c17.68 0 32 14.32 32 32 v48" stroke-dasharray="none" />
    <path d="M208 80 V48 c0-17.68 14.32-32 32-32 h48 c17.68 0 32 14.32 32 32 v32" opacity="0.7" />
  </g>
</svg>