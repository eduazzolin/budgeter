<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27272a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#09090b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded card (squircle shape) -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#grad)" />
  <!-- A formal briefcase icon in white -->
  <g fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" transform="translate(48, 48) scale(0.8125)">
    <!-- Briefcase body -->
    <rect x="64" y="144" width="384" height="256" rx="32" />
    <!-- Handle -->
    <path d="M160 144 V96 c0-26.51 21.49-48 48-48 h96 c26.51 0 48 21.49 48 48 v48" />
    <!-- Center line/lock -->
    <path d="M256 144 v256" />
  </g>
